<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/color.css">
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/footer-header.css">
</head>
<body>

<div id="header"></div>

<main>
  <section class="search-hero">
    <div class="search-hero__inner">
      <span class="search-hero__badge">Ejendomsinvestering Simulator</span>
    
      <h1 class="search-hero__title">Analyser din næste <span>ejendomsinvestering</span>
      </h1>

      <p class="search-hero__text">
        Søg efter en dansk adresse, opret en investeringscase og simulér afkast over tid.
      </p>

      <div class="search-block">
  <div class="search-input-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" placeholder="Søg efter en adresse..." />
    <button class="search-button">Søg</button>
  </div>

  <!-- dropdown -->
  <select id="suggestionsList" class="suggestions-list hidden" size="6"></select>
</div>
</div>
  </section>

<section class="property-section">
  <div class="property-section__header">
    <h2> Dine ejendomme </h2>
    <span id="propertyCount" class="property-count">0 ejendomme</span>
  </div>

  <div id="propertyGrid" class="property-grid">
    
  </div>
</section>

</main>

<div id="footer"></div>

<script src="../js/getlayout.js"></script>
<script src="../js/propertyGrid.js"></script>
<script src="../js/bbrService.js"></script>

</body>
</html>
