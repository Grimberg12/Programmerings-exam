<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="../css/register.css">
  <link rel="stylesheet" href="../css/color.css">
  <link rel="stylesheet" href="../css/footer-header2.css">
</head>
    <body>

    <div id="header"></div>

        <main>
    <h1>Opret en gratis bruger idag!</h1>
<div class="register-container">
  <form action="/register" method="POST">

    <div class="form-group">
      <label for="name">Fornavn:</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
      <label for="lastname">Efternavn:</label>
      <input type="text" id="lastname" name="lastname" required>
    </div>

    <div class="form-group">
      <label for="phone">Telefonnummer:</label>
      <input type="tel" id="phone" name="phone" required>
    </div>

    <div class="form-group">
      <label for="username">Email:</label>
      <input type="email" id="username" name="username" required>
    </div>

    <div class="form-group">
  <label for="password">Opret din adgangskode:</label>
  <input type="password" id="password" name="password" required>

  <small id="passwordError" class="error-text hidden">
    Adgangskoden skal være mindst 8 tegn og indeholde mindst 1 bogstav og 1 tal.
  </small>
</div>

    <div class="form-group">
      <label for="confirm_password">Bekræft adgangskode:</label>
      <input type="password" id="confirm_password" name="confirm_password" required>
    </div>

    <button type="submit" id="register-button">Opret bruger</button>

  </form>
</div>
    <p id="login-link">Har du allerede en bruger? <a href="../public/login.html">Log ind her.</a></p>

<script src="../js/getlayout2.js"></script>
<script src="../js/register.js"></script>

</main>

    <div id="footer"></div>

  </body>
</html>
